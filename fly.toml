# fly.toml app configuration file generated for bakeoff-1 on 2026-05-08T20:26:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bakeoff-1'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
